name: Linux-arm64 Cloudlfare DNS Docker
on: [push]
jobs:
  build-and-docker:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: azolfagharj/action-caddy-builder@v1.0.7
        id: build
        with:
          caddy-version: latest
          output-dir: ./dist
          modules: github.com/caddy-dns/cloudflare
      - name: Build Docker image
        run: |
          cat > Dockerfile << 'EOF'
          FROM scratch
          COPY dist/caddy_linux_arm64 /caddy
          ENTRYPOINT ["/caddy"]
          EOF
          docker build -t caddy-custom:latest -f Dockerfile .
      - name: Run container
        run: docker run --rm caddy-custom:latest version          
